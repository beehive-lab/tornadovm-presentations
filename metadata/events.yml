# metadata/events.yml
#
# Machine-readable list of TornadoVM presentations.
# One entry per talk. Used to (re)generate the root README, a website,
# GitHub Pages, and venue/year indexes.
#
# Field reference (see templates/metadata-template.yml for a blank entry):
#   year, date, venue, venue_name, event_name, title, speakers,
#   location, path, files{pdf,pptx,...}, links{event,paper,...}

- year: 2025
  date: 2025-01-XX
  venue: hipeac
  venue_name: HiPEAC
  event_name: HiPEAC Conference 2025
  title: TornadoVM Dynamic Reconfiguration
  speakers:
    - Firstname Lastname
  location: Barcelona, Spain
  path: slides/2025/hipeac/tornadovm-dynamic-reconfiguration
  files:
    pdf: slides.pdf
    pptx: slides.pptx
  links:
    event: https://example.com
    paper: https://example.com
